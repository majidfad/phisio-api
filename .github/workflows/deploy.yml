name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: production-deploy-backend
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  APP_DIR: /opt/phisio

jobs:
  deploy:
    name: Build and deploy API
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/phisio-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/phisio-api:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure app directory on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ env.APP_DIR }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: APP_DIR
          script: |
            set -euo pipefail
            if [ ! -d "${APP_DIR}" ]; then
              if mkdir -p "${APP_DIR}" 2>/dev/null; then
                true
              else
                sudo mkdir -p "${APP_DIR}"
                sudo chown "$(whoami):$(whoami)" "${APP_DIR}"
              fi
            fi

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: 'deploy/docker-compose.prod.yml,deploy/.env.example,deploy/bootstrap-server.sh'
          target: ${{ env.APP_DIR }}/

      - name: Bootstrap, migrate, and deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_OWNER: ${{ env.IMAGE_OWNER }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          APP_DIR: ${{ env.APP_DIR }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: REGISTRY,IMAGE_OWNER,IMAGE_TAG,APP_DIR,POSTGRES_PASSWORD,JWT_SECRET_KEY,JWT_ISSUER,JWT_AUDIENCE,GHCR_PULL_TOKEN,GITHUB_ACTOR
          script: |
            set -euo pipefail
            cd "${APP_DIR}"

            if [ -f deploy/bootstrap-server.sh ]; then
              chmod +x deploy/bootstrap-server.sh
              bash deploy/bootstrap-server.sh
            elif [ -f bootstrap-server.sh ]; then
              chmod +x bootstrap-server.sh
              bash bootstrap-server.sh
            else
              echo "bootstrap-server.sh missing in ${APP_DIR}"
              exit 1
            fi

            if [ -f deploy/docker-compose.prod.yml ]; then
              mv -f deploy/docker-compose.prod.yml docker-compose.prod.yml
            fi
            rmdir deploy 2>/dev/null || true

            if [ ! -f docker-compose.prod.yml ] || [ ! -f .env ]; then
              echo "Missing ${APP_DIR}/docker-compose.prod.yml or .env after bootstrap"
              exit 1
            fi

            if [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              echo "${GHCR_PULL_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            fi

            export PHISIO_API_IMAGE="${REGISTRY}/${IMAGE_OWNER}/phisio-api:${IMAGE_TAG}"

            if grep -q '^PHISIO_API_IMAGE=' .env; then
              sed -i "s|^PHISIO_API_IMAGE=.*|PHISIO_API_IMAGE=${PHISIO_API_IMAGE}|" .env
            else
              echo "PHISIO_API_IMAGE=${PHISIO_API_IMAGE}" >> .env
            fi

            if [ -n "${POSTGRES_PASSWORD:-}" ]; then
              if grep -q '^POSTGRES_PASSWORD=' .env; then
                sed -i "s|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=${POSTGRES_PASSWORD}|" .env
              else
                echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" >> .env
              fi
            fi

            if [ -n "${JWT_SECRET_KEY:-}" ]; then
              if grep -q '^JWT_SECRET_KEY=' .env; then
                sed -i "s|^JWT_SECRET_KEY=.*|JWT_SECRET_KEY=${JWT_SECRET_KEY}|" .env
              else
                echo "JWT_SECRET_KEY=${JWT_SECRET_KEY}" >> .env
              fi
            fi

            if [ -n "${JWT_ISSUER:-}" ]; then
              if grep -q '^JWT_ISSUER=' .env; then
                sed -i "s|^JWT_ISSUER=.*|JWT_ISSUER=${JWT_ISSUER}|" .env
              else
                echo "JWT_ISSUER=${JWT_ISSUER}" >> .env
              fi
            fi

            if [ -n "${JWT_AUDIENCE:-}" ]; then
              if grep -q '^JWT_AUDIENCE=' .env; then
                sed -i "s|^JWT_AUDIENCE=.*|JWT_AUDIENCE=${JWT_AUDIENCE}|" .env
              else
                echo "JWT_AUDIENCE=${JWT_AUDIENCE}" >> .env
              fi
            fi

            sed -i 's|^HTTP_PORT=.*|HTTP_PORT=3000|' .env
            if ! grep -qE '^HTTP_PORT=' .env; then
              echo 'HTTP_PORT=3000' >> .env
            fi

            # Empty Action secrets override .env; unset so compose reads the file.
            if [ -z "${POSTGRES_PASSWORD:-}" ]; then unset POSTGRES_PASSWORD; fi
            if [ -z "${JWT_SECRET_KEY:-}" ]; then unset JWT_SECRET_KEY; fi
            if [ -z "${JWT_ISSUER:-}" ]; then unset JWT_ISSUER; fi
            if [ -z "${JWT_AUDIENCE:-}" ]; then unset JWT_AUDIENCE; fi
            if [ -z "${GHCR_PULL_TOKEN:-}" ]; then unset GHCR_PULL_TOKEN; fi

            if ! grep -qE '^POSTGRES_PASSWORD=.+' .env; then
              echo "POSTGRES_PASSWORD is empty in ${APP_DIR}/.env (and secret is unset)"
              exit 1
            fi
            if ! grep -qE '^JWT_SECRET_KEY=.+' .env; then
              echo "JWT_SECRET_KEY is empty in ${APP_DIR}/.env (and secret is unset)"
              exit 1
            fi

            echo "Removing old API image(s) before deploy..."
            docker compose -f docker-compose.prod.yml --env-file .env stop api || true
            docker compose -f docker-compose.prod.yml --env-file .env rm -f api || true
            docker images "${REGISTRY}/${IMAGE_OWNER}/phisio-api" -q | sort -u | xargs -r docker rmi -f || true

            docker compose -f docker-compose.prod.yml --env-file .env pull api postgres
            docker compose -f docker-compose.prod.yml --env-file .env up -d postgres api
            docker compose -f docker-compose.prod.yml --env-file .env ps

            docker image prune -f || true

            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml --env-file .env exec -T api curl -fsS http://localhost:8080/api/health > /dev/null; then
                echo "API health check passed"
                exit 0
              fi
              sleep 5
            done

            echo "API health check failed"
            docker compose -f docker-compose.prod.yml --env-file .env logs --tail=100 api postgres
            exit 1
