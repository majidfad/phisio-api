# Unified production stack (owned by phisio-api).
# Deploy path: /opt/phisio
# Images must come from GHCR (set by CI) — never use *:local / *:pending on the server.
# API CI: docker compose up -d postgres api
# Web CI: docker compose --profile web up -d --no-deps web

name: phisio

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '5m'
    max-file: '2'

services:
  postgres:
    image: postgres:16-alpine
    pull_policy: missing
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - effective_cache_size=192MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - max_connections=40
      - -c
      - wal_buffers=4MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-phisio}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - phisio_pgdata:/var/lib/postgresql/data
    ports:
      # Localhost only — connect via SSH tunnel (not public).
      - '127.0.0.1:${POSTGRES_PORT:-5433}:5432'
    networks:
      - phisio_internal
    shm_size: 64mb
    mem_limit: 256m
    cpus: 0.35
    logging: *default-logging
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-phisio}',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  api:
    image: ${PHISIO_API_IMAGE:?PHISIO_API_IMAGE must be set to a ghcr.io/... image}
    pull_policy: missing
    container_name: phisio-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      DOTNET_EnableDiagnostics: '0'
      # ~220 MiB GC heap hard limit for 1GB VPS
      DOTNET_GCHeapHardLimit: '0xDC00000'
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB:-phisio};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      JwtSettings__SecretKey: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JwtSettings__Issuer: ${JWT_ISSUER:-Phisio.Api}
      JwtSettings__Audience: ${JWT_AUDIENCE:-Phisio.Client}
      JwtSettings__AccessTokenExpirationMinutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-60}
      # Initial admin seeding (optional). When no active admin exists, the API
      # creates one at startup using these values. Set them in the server .env,
      # e.g.:
      #   SEED_ADMIN_PHONE_NUMBER=+10000000000
      #   SEED_ADMIN_PASSWORD=Admin123!
      # If left empty, seeding is skipped with a warning and startup continues.
      SeedAdmin__PhoneNumber: ${SEED_ADMIN_PHONE_NUMBER:-}
      SeedAdmin__Password: ${SEED_ADMIN_PASSWORD:-}
    volumes:
      - phisio_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      phisio_internal:
        aliases:
          - api
    mem_limit: 384m
    cpus: 0.45
    logging: *default-logging
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/api/health']
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s

  web:
    profiles: [web]
    image: ${PHISIO_WEB_IMAGE:?PHISIO_WEB_IMAGE must be set to a ghcr.io/... image}
    pull_policy: missing
    container_name: phisio-web
    restart: unless-stopped
    ports:
      # Localhost only — public traffic must go through Cloudflare -> proxy (443).
      - '127.0.0.1:${HTTP_PORT:-3000}:80'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - phisio_internal
    mem_limit: 64m
    cpus: 0.15
    logging: *default-logging
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Cloudflare (Full strict) -> origin :443/:80 -> web:80.
  # TLS uses a Cloudflare Origin Certificate mounted at ./certs (origin.pem/origin.key).
  proxy:
    profiles: [web]
    image: nginx:1.27-alpine
    pull_policy: missing
    container_name: phisio-proxy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web
    networks:
      - phisio_internal
    mem_limit: 48m
    cpus: 0.15
    logging: *default-logging
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/healthz']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  phisio_internal:
    name: phisio_internal
    driver: bridge

volumes:
  phisio_pgdata:
    name: phisio_pgdata
  phisio_uploads:
    name: phisio_uploads
