services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-phisio}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - phisio_pgdata:/var/lib/postgresql/data
    networks:
      - phisio_internal
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-phisio}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    image: ${PHISIO_API_IMAGE:?PHISIO_API_IMAGE is required}
    container_name: phisio-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB:-phisio};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      JwtSettings__SecretKey: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JwtSettings__Issuer: ${JWT_ISSUER:-Phisio.Api}
      JwtSettings__Audience: ${JWT_AUDIENCE:-Phisio.Client}
      JwtSettings__AccessTokenExpirationMinutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-60}
    volumes:
      - phisio_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      phisio_internal:
        aliases:
          - api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/api/health']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

networks:
  phisio_internal:
    name: phisio_internal
    driver: bridge

volumes:
  phisio_pgdata:
  phisio_uploads:
