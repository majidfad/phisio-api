# Reverse proxy for zivan.me
# Public TLS is terminated by Cloudflare. Cloudflare connects to this origin over
# HTTP (:80). This proxy forwards to the web container (:80), which serves the SPA
# and proxies /api and /uploads to the API.

# Restore the real visitor IP from Cloudflare (otherwise every request looks like
# it comes from a Cloudflare edge node).
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Clients reach Cloudflare over HTTPS; the origin sees plain HTTP.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      https;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name zivan.me www.zivan.me;

    client_max_body_size 25m;

    location = /healthz {
        return 200 "ok\n";
        access_log off;
    }

    # Resolve the web container name at request time so this proxy can start
    # even if the web container isn't up yet (avoids "host not found in upstream").
    resolver 127.0.0.11 valid=30s;
    set $upstream_web web;

    location / {
        proxy_pass http://$upstream_web:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
